name: Verificare Proiect FastAPI

on:
  push:

jobs:
  build-and-check:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Descarcă codul
        uses: actions/checkout@v3

      - name: 🐍 Configurează Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10' # Poți schimba cu versiunea ta de Python

      - name: 📦 Instalează pachetele necesare
        run: |
          python -m pip install --upgrade pip
          pip install fastapi uvicorn sqlalchemy mysql-connector-python pydantic jinja2 pytest httpx

      - name: 🔍 Verifică sintaxa Python (căutăm erori fatale)
        run: |
          python -m py_compile main.py
          python -m py_compile models.py
          
      # Am lăsat testele dezactivate momentan până rezolvăm faza cu baza de date
      - name: Creează un db_conn.py fals pentru teste
        run: |
          echo "def get_db(): pass" > db_conn.py
      
      - name: Rulează testele
        run: python -m pytest test.py
<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Management Proiect</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Honk:MORF@15&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        honk: ['"Honk"', 'system-ui'],
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-pink-100 p-8">
    <div class="max-w-4xl mx-auto">
        <h1 class="text-6xl font-honk mb-8 text-center">Gestiune Țări</h1>

        <div class="bg-white p-6 rounded-lg shadow-md mb-8">
            <h2 class="text-xl font-semibold mb-4">Adaugă Țară Nouă</h2>
            <div class="flex gap-4">
                <input type="text" id="countryName" placeholder="Nume țară" class="border p-2 rounded w-full">
                <button onclick="addCountry()" class="bg-green-500 text-white px-6 py-2 rounded hover:bg-green-600 transition">
                    Adaugă
                </button>
            </div>
        </div>

        <div class="bg-white p-6 rounded-lg shadow-md">
            <h2 class="text-xl font-semibold mb-4">Listă Țări Active</h2>
            <ul id="countriesList" class="divide-y divide-gray-200">
                <li class="py-3 text-gray-500">Se încarcă datele...</li>
            </ul>
        </div>
    </div>

    <script>
    // 1. Legătura principală (Adresa motorului tău)
    const API_URL = "http://127.0.0.1:8000"; 

    // 2. Funcția care aduce țările (Legată de @app.get("/countries/"))
    async function fetchCountries() {
        try {
            // Folosim exact ruta din Python-ul tău
            const response = await fetch(`${API_URL}/countries/`); 
            const data = await response.json();
            
            const list = document.getElementById('countriesList');
            list.innerHTML = '';

            // 'data' este lista de țări care vine din baza de date
            data.forEach(country => {
                const li = document.createElement('li');
                li.className = "py-3 flex justify-between items-center border-b";
                li.innerHTML = `
                    <span class="font-medium text-gray-700">${country.name}</span>
                    <button onclick="deleteCountry('${country.name}')" class="text-red-500 hover:text-red-700 text-sm font-bold">
                        ȘTERGE
                    </button>
                `;
                list.appendChild(li);
            });
        } catch (error) {
            console.error("Hopa! Nu pot lua țările:", error);
        }
    }

    // 3. Funcția care trimite o țară nouă (Legată de @app.post("/countries/"))
    async function addCountry() {
        const input = document.getElementById('countryName');
        const numeTara = input.value;

        if (!numeTara) return alert("Scrie un nume de țară!");

        try {
            const response = await fetch(`${API_URL}/countries/`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                // Trimitem obiectul exact cum îl așteaptă CountryCreate în Python
                body: JSON.stringify({ name: numeTara }) 
            });

            if (response.ok) {
                input.value = ''; // Curățăm căsuța
                fetchCountries(); // Reîmprospătăm lista automat
            } else {
                alert("Eroare la salvare! Verifică consola.");
            }
        } catch (error) {
            console.error("Eroare la POST:", error);
        }
    }

    // 4. Funcția care șterge (Legată de @app.delete("/countries/{name}"))
    async function deleteCountry(name) {
        if (!confirm(`Sigur vrei să ștergi ${name}?`)) return;

        try {
            const response = await fetch(`${API_URL}/countries/${name}`, {
                method: 'DELETE'
            });

            if (response.ok) {
                fetchCountries();
            }
        } catch (error) {
            console.error("Eroare la DELETE:", error);
        }
    }

    // Pornim motorul când se deschide pagina
    fetchCountries();
</script>
</body>
</html>
